# Supabase OSS 셀프호스팅 스택
# 출처: https://github.com/supabase/supabase/tree/master/docker (단순화 버전)
# 가족 4인 규모에 맞춰 storage·imgproxy 등은 제외

name: gagyebu

services:
  web:
    # 기본 동작: GitHub Actions가 빌드해 ghcr.io에 올린 이미지를 그대로 pull.
    # 로컬에서 직접 빌드하려면 `docker compose -f docker-compose.yml -f docker-compose.dev.yml up`로 override.
    image: ${WEB_IMAGE:-ghcr.io/sld56/homeaccountbook-web:latest}
    restart: unless-stopped
    pull_policy: always
    depends_on:
      kong: { condition: service_started }
    ports:
      - "127.0.0.1:8080:80"   # cloudflared가 이쪽으로 프록시 (Supabase API도 여기서 분기)

  postgres:
    image: supabase/postgres:15.1.1.78
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on: []
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      # 비밀번호 설정 스크립트만 init-scripts/ 서브디렉토리에 추가 마운트.
      # init-scripts/ 안의 다른 supabase 내장 스크립트들이 역할을 먼저 만들고,
      # 우리 99-* 스크립트가 알파벳 순으로 마지막에 실행되어 비밀번호를 할당.
      # supautils protection이 활성화되기 전이라 ALTER USER 가능.
      - ./db-init/99-set-roles-passwords.sh:/docker-entrypoint-initdb.d/init-scripts/99-set-roles-passwords.sh:ro
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # LAN/Tailscale에서만 접근 (외부 노출 X)

  gotrue:
    image: supabase/gotrue:v2.158.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SITE_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${SITE_URL},${SITE_URL}/auth/callback,${SITE_URL}/invite
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      # 이메일 매직 링크 + OTP
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_MAILER_OTP_EXP: 300            # 5분
      GOTRUE_MAILER_OTP_LENGTH: 6
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      # SMTP (Resend)
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASSWORD}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/callback
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/callback
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/callback
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/callback
      # 보안
      GOTRUE_PASSWORD_MIN_LENGTH: 12
      GOTRUE_RATE_LIMIT_EMAIL_SENT: 30      # 시간당 가족 4인 + 초대 여유
      GOTRUE_RATE_LIMIT_HEADER: cf-connecting-ip   # Cloudflare 실제 IP
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: "true"
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: 10

  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600

  realtime:
    image: supabase/realtime:v2.30.34
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: 10000
      APP_NAME: realtime
      # SEED_SELF_HOST가 매 시작마다 'realtime-dev' tenant를 만드는 noise를 줄이려면
      # false로 두고 마이그레이션 0006이 'realtime' tenant를 idempotent하게 관리.
      # (마이그레이션 적용 전 깔끔한 첫 설치에서는 true로 잠시 켜 seed → 그 후 false 권장)
      SEED_SELF_HOST: "false"
      RUN_JANITOR: "true"

  edge-functions:
    image: supabase/edge-runtime:v1.58.10
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../supabase/functions:/home/deno/functions:Z
    environment:
      JWT_SECRET: ${JWT_SECRET}
      # 컨테이너 내부 통신용 — getUser() 등이 외부 URL로 나가면 Cloudflare 루프 발생
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      RESEND_API_KEY: ${SMTP_PASSWORD}
      MAIL_FROM: ${SMTP_ADMIN_EMAIL}
      # 이메일·초대 링크 등 사용자에게 보내는 URL은 외부 도메인
      APP_URL: ${SITE_URL}
      # 가족 생성 권한 화이트리스트 (쉼표 구분). 비어 있으면 누구나 가능 (초기 설정용).
      # 운영 중에는 가족 owner 이메일들만 등록 — 외부 가입자가 자기 가족을 못 만들게.
      ALLOWED_OWNER_EMAILS: ${ALLOWED_OWNER_EMAILS:-}
    command:
      - start
      - --main-service
      - /home/deno/functions/main

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      gotrue: { condition: service_started }
      postgrest: { condition: service_started }
      realtime: { condition: service_started }
      edge-functions: { condition: service_started }
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml:ro
    ports:
      - "127.0.0.1:8000:8000"   # cloudflared가 이쪽으로 프록시

  studio:
    # Supabase가 날짜 태그를 종종 회수해 latest로 고정.
    # 운영용 DB 관리 UI라 latest로 충분 (데이터는 postgres 볼륨이 별도)
    image: supabase/studio:latest
    restart: unless-stopped
    depends_on:
      kong: { condition: service_started }
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: Family
      DEFAULT_PROJECT_NAME: Gagyebu
      SUPABASE_URL: ${SITE_URL}
      SUPABASE_PUBLIC_URL: ${SITE_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:3000:3000"   # Tailscale로만 접근 (관리 UI)

  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  postgres-data:
