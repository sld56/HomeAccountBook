# 단일 도메인으로 React 정적 + Supabase API를 함께 서빙
# 클라이언트 → cloudflared → 이 nginx → (정적 / kong)

server {
  listen 80 default_server;
  server_name _;

  # Docker 내부 DNS (kong을 요청 시점에 해석 → 시작 실패 방지 + 재시작에 견고)
  resolver 127.0.0.11 valid=30s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  # 보안 헤더 (CSP는 connect-src에 SUPABASE_URL이 자기 자신과 동일하므로 'self'만으로 충분)
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://$host; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  # 정적 자산 — 캐시 길게 (해시 파일명).
  # expires가 자동으로 Cache-Control 설정 → add_header 사용 안 함 (server-level 보안 헤더 상속 유지)
  location /assets/ {
    expires 1y;
    try_files $uri =404;
  }

  # Supabase API 프록시 → kong
  location ~ ^/(auth|rest|realtime|functions|storage)/v1/ {
    # 변수로 받으면 시작 시점이 아니라 요청 시점에 해석됨
    set $kong_upstream "kong:8000";
    proxy_pass http://$kong_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Cloudflare가 진짜 IP 전달
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    # WebSocket (realtime)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  # SPA fallback — 모든 경로를 index.html로. expires -1 = Cache-Control: no-cache.
  location / {
    try_files $uri $uri/ /index.html;
    expires -1;
  }
}
