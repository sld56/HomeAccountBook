_format_version: "2.1"
_transform: true

# Kong은 단순 라우팅 + CORS만 담당.
# 인증/권한은 모두 다운스트림 서비스가 처리:
#   - PostgREST: JWT 검증 + Postgres RLS
#   - gotrue: 자체 세션 관리
#   - edge-functions: getCurrentUser 등으로 JWT 검증
#   - realtime: JWT 검증
#
# kong.yml에서 ${VAR} 형태의 env 치환을 Kong 2.x 선언형 설정이 지원하지 않아
# 이전 key-auth/acl 플러그인은 동작 불가 → 모두 제거.

services:
  - name: auth-v1
    url: http://gotrue:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  - name: rest-v1
    url: http://postgrest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors

  - name: realtime-v1
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors

  - name: functions-v1
    url: http://edge-functions:9000/
    routes:
      - name: functions-v1-all
        strip_path: true
        paths:
          - /functions/v1/
    plugins:
      - name: cors

  - name: meta
    url: http://meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: cors
